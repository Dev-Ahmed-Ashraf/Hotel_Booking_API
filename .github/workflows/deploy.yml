name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -f ./Hotel_Booking_API/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/hotel-booking-api:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/hotel-booking-api:latest \
            ./Hotel_Booking_API

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/hotel-booking-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/hotel-booking-api:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          # Use immutable SHA tag — App Service often keeps a cached :latest image
          images: ${{ secrets.ACR_LOGIN_SERVER }}/hotel-booking-api:${{ github.sha }}

      - name: Restart Web App
        run: az webapp restart --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
